<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Menu - QR Scan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="customer-view.css">
</head>
<body>
  <main class="phone-shell">
    <header class="hero">
      <p class="mini">QR Menu</p>
      <h1 id="tableTitle">Table T1</h1>
      <div class="table-switch">
        <label for="tableSelect">Demo table switch</label>
        <select id="tableSelect"></select>
      </div>
      <p id="offerText"></p>
    </header>

    <section class="section">
      <div class="section-head">
        <h2>Today's Offers</h2>
        <span id="offerDateLabel"></span>
      </div>
      <div id="dailyOffers" class="offer-list"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Recommended Menu</h2>
        <span id="activeOrderCount">0 Active Orders</span>
      </div>
      <div id="menuList" class="menu-list"></div>
    </section>

    <section class="section">
      <h2>Your Ticket Status</h2>
      <div id="ticketList" class="ticket-list"></div>
    </section>

    <footer class="cart-bar">
      <div id="cartLines" class="cart-lines"></div>
      <div class="total-row">
        <span>Total</span>
        <strong id="cartTotal">Rs. 0</strong>
      </div>
      <button id="placeBtn">Place Order</button>
      <p id="toast" class="toast"></p>
    </footer>
  </main>

  <script src="customer-view.js"></script>
</body>
</html>
