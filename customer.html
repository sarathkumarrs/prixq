<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Menu - QR Scan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="customer-view.css">
</head>
<body>
  <main class="phone-shell">
    <header class="hero">
      <p class="mini">QR Ordering</p>
      <h1 id="brandName">ALDEEK Container Cafe</h1>
      <p id="brandMeta" class="brand-meta"></p>
      <div class="hero-grid">
        <div>
          <p class="muted-label">Table</p>
          <h2 id="tableTitle">Table T1</h2>
        </div>
        <div>
          <label for="tableSelect" class="muted-label">Switch table</label>
          <select id="tableSelect"></select>
        </div>
        <div>
          <label for="demoDateInput" class="muted-label">Demo date</label>
          <input id="demoDateInput" type="date">
        </div>
      </div>
      <p id="offerText"></p>
    </header>

    <section class="section">
      <div class="section-head">
        <h2>Today's Offers</h2>
        <span id="offerDateLabel"></span>
      </div>
      <div id="dailyOffers" class="offer-list"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Menu</h2>
        <span id="activeOrderCount">0 Active Orders</span>
      </div>
      <div class="filters">
        <input id="menuSearch" type="search" placeholder="Search item or category">
        <select id="sortSelect">
          <option value="default">Sort: Recommended</option>
          <option value="priceAsc">Price: Low to high</option>
          <option value="priceDesc">Price: High to low</option>
          <option value="nameAsc">Name: A to Z</option>
        </select>
      </div>
      <div id="categoryChips" class="chip-row"></div>
      <div id="menuList" class="menu-list grouped"></div>
    </section>

    <section class="section">
      <h2>Your Ticket Status</h2>
      <div id="ticketList" class="ticket-list"></div>
    </section>

    <footer class="cart-bar">
      <div id="cartLines" class="cart-lines"></div>
      <div class="total-row">
        <span>Total</span>
        <strong id="cartTotal">Rs. 0</strong>
      </div>
      <button id="placeBtn">Place Order</button>
      <p id="toast" class="toast"></p>
    </footer>
  </main>

  <script src="data.js"></script>
  <script src="customer-view.js"></script>
</body>
</html>
